<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极验验证测试</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
        }
        .test-container {
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
        }
        .status {
            padding: 10px;
            border-radius: 4px;
            margin: 10px 0;
        }
        .success {
            background-color: #d1fae5;
            color: #065f46;
            border: 1px solid #a7f3d0;
        }
        .error {
            background-color: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }
        .loading {
            background-color: #fef3c7;
            color: #92400e;
            border: 1px solid #fde68a;
        }
    </style>
</head>
<body>
    <h1>极验验证测试页面</h1>
    
    <div class="test-container">
        <h2>测试说明</h2>
        <p>这个页面测试极验验证组件是否正常工作。</p>
        
        <div id="status" class="status loading">
            正在加载验证组件...
        </div>
        
        <div id="captcha-container"></div>
        
        <div id="result" style="display: none;">
            <h3>验证结果</h3>
            <pre id="result-data"></pre>
        </div>
    </div>

    <script src="https://static.geetest.com/v4/gt4.js"></script>
    <script>
        // 你的极验Captcha ID
        const CAPTCHA_ID = "0d777c8c300ebee3bb39b98b9cc95b21";
        
        // 更新状态显示
        function updateStatus(message, type = 'loading') {
            const statusEl = document.getElementById('status');
            statusEl.textContent = message;
            statusEl.className = `status ${type}`;
        }
        
        // 显示验证结果
        function showResult(result) {
            const resultEl = document.getElementById('result');
            const dataEl = document.getElementById('result-data');
            
            dataEl.textContent = JSON.stringify(result, null, 2);
            resultEl.style.display = 'block';
        }
        
        // 初始化极验验证
        function initGeetest() {
            updateStatus('正在初始化极验验证...');
            
            initGeetest4({
                captchaId: CAPTCHA_ID,
                product: 'bind',
                language: 'zh',
                nativeButton: {
                    width: '300px',
                    height: '40px',
                },
                riskType: 'slide',
                hideBar: ['close', 'refresh'],
                mask: {
                    outside: true,
                    bgColor: '#0000004d'
                }
            }, function(captchaObj) {
                updateStatus('验证码准备就绪，请点击按钮开始验证', 'success');
                
                // 验证码准备就绪
                captchaObj.onReady(function() {
                    console.log('极验验证码准备就绪');
                });
                
                // 验证成功
                captchaObj.onSuccess(function() {
                    const result = captchaObj.getValidate();
                    if (result) {
                        updateStatus('验证成功！', 'success');
                        showResult(result);
                        
                        // 存储验证结果
                        localStorage.setItem('geetest_verified', 'true');
                        localStorage.setItem('geetest_result', JSON.stringify(result));
                        localStorage.setItem('geetest_timestamp', Date.now().toString());
                        
                        console.log('验证成功:', result);
                    }
                });
                
                // 验证失败
                captchaObj.onError(function(err) {
                    updateStatus('验证失败，请重试', 'error');
                    console.error('极验验证错误:', err);
                });
                
                // 将验证码插入到页面
                captchaObj.appendTo("#captcha-container");
                
            });
        }
        
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 检查是否已经验证过（24小时内有效）
            const verified = localStorage.getItem('geetest_verified');
            const timestamp = localStorage.getItem('geetest_timestamp');
            
            if (verified === 'true' && timestamp) {
                const now = Date.now();
                const verificationTime = parseInt(timestamp);
                const hoursDiff = (now - verificationTime) / (1000 * 60 * 60);
                
                if (hoursDiff < 24) {
                    updateStatus('24小时内已验证过，无需重复验证', 'success');
                    const result = localStorage.getItem('geetest_result');
                    if (result) {
                        showResult(JSON.parse(result));
                    }
                    return;
                } else {
                    // 超过24小时，清除存储
                    localStorage.removeItem('geetest_verified');
                    localStorage.removeItem('geetest_result');
                    localStorage.removeItem('geetest_timestamp');
                }
            }
            
            // 初始化验证
            initGeetest();
        });
    </script>
</body>
</html>
